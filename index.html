<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我想说</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 背景层 -->
  <div class="stars" id="starsLayer"></div>
  <canvas id="heartsCanvas"></canvas>
  <div class="cursor-glow" id="cursorGlow"></div>

  <!-- 气泡层 -->
  <div class="bubble-container" id="bubbleContainer"></div>

  <!-- 中央卡片 -->
  <div class="card" id="mainCard">
    <div class="icon">💗</div>
    <h1>四季与你</h1>
    <div class="divider"></div>

    <!-- 3D 照片轮播 -->
    <div class="carousel-wrapper" id="carouselWrapper">
      <div class="carousel-stage" id="carouselStage">
        <!-- JS 动态填充照片 -->
      </div>
    </div>

    <p class="sub">从遇见你的那天起<br>我的世界就开满了花</p>
    <div class="divider"></div>
    <p class="counter" id="dayCounter"></p>
    <span class="counter-toggle" id="counterToggle" title="显示/隐藏天数">👁️</span>
  </div>

  <!-- 滚动指示器 -->
  <div class="scroll-hint" id="scrollHint">
    <span>往下看我们的故事</span>
    <div class="scroll-arrow">↓</div>
  </div>

  <!-- 时间线 -->
  <section class="timeline" id="timeline">
    <h2 class="timeline-title">我们 ✨ 的故事</h2>
    <div class="timeline-line"></div>
    <div class="timeline-list" id="timelineList">
      <!-- JS 动态填充 -->
    </div>
  </section>

  <!-- 逃跑按钮 -->
  <button class="escape-btn" id="escapeBtn">别点我 😜</button>

  <!-- 分享按钮 -->
  <button class="share-btn" id="shareBtn" title="生成分享卡片">
    <span>📸</span>
  </button>

  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
</body>
</html>

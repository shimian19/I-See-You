<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我想说</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    background: linear-gradient(135deg, #1a0024 0%, #3d0b37 25%, #6b1d4c 50%, #a8325a 75%, #d44a6e 100%);
    background-size: 400% 400%;
    animation: gradientShift 20s ease infinite;
    cursor: default;
    user-select: none;
    -webkit-user-select: none;
  }

  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    25% { background-position: 100% 0%; }
    50% { background-position: 100% 100%; }
    75% { background-position: 0% 100%; }
  }

  canvas#heartsCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  .bubble-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 2;
  }

  .bubble {
    position: absolute;
    bottom: -120px;
    padding: 12px 22px;
    border-radius: 50px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(255, 255, 255, 0.25);
    color: #fff;
    font-size: 16px;
    white-space: nowrap;
    pointer-events: auto;
    cursor: pointer;
    text-shadow: 0 0 12px rgba(255, 150, 180, 0.6);
    box-shadow: 0 4px 20px rgba(255, 100, 150, 0.15), inset 0 0 20px rgba(255, 255, 255, 0.08);
    transition: transform 0.4s ease, background 0.4s ease, box-shadow 0.4s ease, border-radius 0.4s ease;
    animation: rise linear forwards;
  }

  .bubble .bubble-text {
    transition: opacity 0.3s ease;
  }

  .bubble.paused {
    animation-play-state: paused;
    background: rgba(255, 255, 255, 0.25);
    box-shadow: 0 8px 30px rgba(255, 100, 150, 0.4), inset 0 0 25px rgba(255, 255, 255, 0.15);
    z-index: 10;
  }

  .photo-popup {
    position: fixed;
    pointer-events: none;
    z-index: 20;
    opacity: 0;
    transform: translate(-50%, 10px) scale(0.6);
    transition: opacity 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .photo-popup.show {
    opacity: 1;
    transform: translate(-50%, -100%) scale(1);
  }

  .photo-popup img {
    display: block;
    width: 180px;
    height: 180px;
    border-radius: 18px;
    object-fit: cover;
    border: 3px solid rgba(255, 255, 255, 0.5);
    box-shadow: 0 16px 50px rgba(0, 0, 0, 0.45), 0 0 40px rgba(255, 100, 160, 0.3);
    margin-bottom: 8px;
  }

  .photo-popup .photo-label {
    display: none;
  }

  @keyframes rise {
    0% {
      transform: translateY(0) translateX(0);
      opacity: 0;
    }
    5% {
      opacity: 1;
    }
    85% {
      opacity: 1;
    }
    100% {
      transform: translateY(calc(-100vh - 120px)) translateX(var(--drift));
      opacity: 0;
    }
  }

  .card {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    padding: 50px 60px;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 80px rgba(255, 100, 150, 0.15);
    text-align: center;
    animation: cardFloat 4s ease-in-out infinite;
  }

  @keyframes cardFloat {
    0%, 100% { transform: translate(-50%, -50%) translateY(0); }
    50% { transform: translate(-50%, -50%) translateY(-12px); }
  }

  .card .icon {
    font-size: 60px;
    margin-bottom: 16px;
    animation: heartbeat 1.2s ease-in-out infinite;
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    15% { transform: scale(1.25); }
    30% { transform: scale(1); }
    45% { transform: scale(1.2); }
    60% { transform: scale(1); }
  }

  .card h1 {
    font-size: 42px;
    color: #fff;
    margin-bottom: 12px;
    letter-spacing: 4px;
    text-shadow: 0 0 30px rgba(255, 150, 200, 0.6);
  }

  .card p.sub {
    font-size: 18px;
    color: rgba(255, 255, 255, 0.75);
    letter-spacing: 2px;
    line-height: 1.6;
  }

  .card .divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
    margin: 20px auto;
  }

  .click-heart {
    position: fixed;
    pointer-events: none;
    z-index: 6;
    font-size: 28px;
    animation: heartPop 1.5s ease-out forwards;
  }

  @keyframes heartPop {
    0% {
      transform: translate(-50%, -50%) scale(0);
      opacity: 1;
    }
    40% {
      transform: translate(-50%, -50%) scale(1.4);
      opacity: 1;
    }
    100% {
      transform: translate(-50%, calc(-50% - 120px)) scale(0.3);
      opacity: 0;
    }
  }

  @media (max-width: 600px) {
    .card {
      padding: 32px 28px;
      border-radius: 18px;
    }
    .card h1 { font-size: 28px; }
    .card p.sub { font-size: 15px; }
    .bubble { font-size: 14px; padding: 10px 16px; }
    .photo-popup img { width: 140px; height: 140px; }
  }
</style>
</head>
<body>

<canvas id="heartsCanvas"></canvas>

<div class="bubble-container" id="bubbleContainer"></div>

<div class="card">
  <div class="icon">💗</div>
  <h1>四季与你</h1>
  <div class="divider"></div>
  <p class="sub">从遇见你的那天起<br>我的世界就开满了花</p>
</div>

<script>
// ========== 温馨话语 + 照片配对 ==========
// 每条文字配一张照片，按顺序一一对应
// 把照片放到 photos/ 文件夹，修改下面的 photo 字段即可
const bubblePairs = [
  { msg: "遇见你是我最美丽的意外 💕", photo: "photos/scenery-01.jpg" },
  { msg: "想把所有的温柔都给你",       photo: "photos/001.jpg" },
  { msg: "你一笑，我的世界就亮了",     photo: "photos/002.jpg" },
  { msg: "有你在，每天都是晴天 ☀️",   photo: "photos/003.jpg" },
  { msg: "你是我的星辰大海 ✨",        photo: "photos/004.jpg" },
  { msg: "目光所至，皆是你",           photo: "photos/scenery-01.jpg" },
  { msg: "想和你一起看遍四季",         photo: "photos/scenery-02.jpg" },
  { msg: "你是我最想留住的幸运",       photo: "photos/scenery-03.jpg" },
  { msg: "世界那么大，偏偏喜欢你",     photo: "photos/scenery-04.jpg" },
  { msg: "余生请多指教",               photo: "photos/scenery-05.jpg" },
  { msg: "你就是我的整个宇宙 🌌",     photo: "photos/scenery-06.jpg" },
  { msg: "有你的地方，就是家",         photo: "photos/scenery-07.jpg" },
  { msg: "春风十里，不如你",           photo: "photos/scenery-08.jpg" },
  { msg: "山河远阔，人间烟火，无一是你，无一不是你", photo: "photos/scenery-09.jpg" },
  { msg: "我愿意，用一生来说我爱你",   photo: "photos/scenery-10.jpg" },
  { msg: "你是我写过最美的诗",         photo: "photos/scenery-11.jpg" },
  { msg: "想和你慢慢变老",             photo: "photos/scenery-12.jpg" },
  { msg: "此生有你，足矣",             photo: "photos/scenery-13.jpg" },
  { msg: "你是最温暖的光",             photo: "photos/scenery-14.jpg" },
  { msg: "一想到你，嘴角就上扬",       photo: "photos/scenery-15.jpg" },
  { msg: "你呀你，是我最甜蜜的烦恼",   photo: "photos/scenery-16.jpg" },
  { msg: "风很温柔，花很香，你很特别 🌸", photo: "photos/scenery-17.jpg" },
  { msg: "永远为期，爱你为誓",         photo: "photos/scenery-18.jpg" },
  { msg: "你是我的偏爱和例外",         photo: "photos/scenery-19.jpg" },
  { msg: "入目无别人，四下皆是你",     photo: "photos/scenery-20.jpg" },
  { msg: "浪漫不止，温柔不息",         photo: "photos/scenery-21.jpg" },
  { msg: "你是我疲惫生活里的英雄梦想", photo: "photos/scenery-22.jpg" },
  { msg: "见过山海，最念是你",         photo: "photos/scenery-23.jpg" },
  { msg: "时光往复，爱你如初",         photo: "photos/scenery-24.jpg" },
  { msg: "希望我们都是彼此心事的守口如瓶", photo: "photos/scenery-25.jpg" },
  { msg: "心动，从你的名字开始",       photo: "photos/scenery-26.jpg" },
  { msg: "你是我藏在微风里的欢喜",     photo: "photos/scenery-27.jpg" },
  { msg: "万物皆甜，而你胜万物",       photo: "photos/scenery-28.jpg" },
  { msg: "陪你度过漫长岁月",           photo: "photos/scenery-29.jpg" },
  { msg: "你是人间四月天 🌿",         photo: "photos/scenery-30.jpg" },
];

// ========== Canvas 爱心粒子 ==========
const canvas = document.getElementById('heartsCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
let animationId;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class Particle {
  constructor() {
    this.reset();
  }

  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 14 + 4;
    this.speedY = -Math.random() * 0.4 - 0.15;
    this.speedX = (Math.random() - 0.5) * 0.3;
    this.opacity = Math.random() * 0.35 + 0.08;
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = Math.random() * 0.008 + 0.003;
  }

  update() {
    this.y += this.speedY;
    this.x += this.speedX + Math.sin(this.wobble) * 0.3;
    this.wobble += this.wobbleSpeed;

    if (this.y < -30 || this.x < -30 || this.x > canvas.width + 30) {
      this.reset();
      this.y = canvas.height + 30;
    }
  }

  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.opacity;
    ctx.fillStyle = '#ffb3c6';
    ctx.font = `${this.size}px serif`;
    ctx.fillText('♥', this.x, this.y);
    ctx.restore();
  }
}

for (let i = 0; i < 50; i++) {
  const p = new Particle();
  p.y = Math.random() * canvas.height;
  particles.push(p);
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.update();
    p.draw(ctx);
  });
  animationId = requestAnimationFrame(animateParticles);
}
animateParticles();

// ========== 气泡系统 ==========
const bubbleContainer = document.getElementById('bubbleContainer');
let bubbleId = 0;

// 全局照片弹窗
const photoPopup = document.createElement('div');
photoPopup.className = 'photo-popup';
photoPopup.innerHTML = '<img src="" alt="我们的照片">';
document.body.appendChild(photoPopup);
const photoPopupImg = photoPopup.querySelector('img');

let activeBubble = null;

function showPhotoPopup(bubbleEl, photoSrc) {
  if (!photoSrc) return;
  photoPopupImg.src = photoSrc;
  photoPopupImg.onerror = () => {
    photoPopupImg.src = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#ff6b9d"/><stop offset="100%" style="stop-color:#c44dff"/></linearGradient></defs><rect width="180" height="180" rx="18" fill="url(#g)"/><text x="90" y="80" text-anchor="middle" font-size="44">📷</text><text x="90" y="118" text-anchor="middle" font-size="14" fill="white" font-family="sans-serif">放入照片</text><text x="90" y="140" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.7)" font-family="sans-serif">photos/ 文件夹</text></svg>');
  };
  const rect = bubbleEl.getBoundingClientRect();
  photoPopup.style.left = (rect.left + rect.width / 2) + 'px';
  photoPopup.style.top = (rect.top - 8) + 'px';
  photoPopup.classList.add('show');
}

function hidePhotoPopup() {
  photoPopup.classList.remove('show');
}

function createBubble() {
  const el = document.createElement('div');
  el.className = 'bubble';

  const pair = bubblePairs[Math.floor(Math.random() * bubblePairs.length)];

  el.innerHTML = `<span class="bubble-text">${pair.msg}</span>`;

  const left = Math.random() * 85 + 5;
  const duration = Math.random() * 8 + 14;
  const drift = (Math.random() - 0.5) * 80;
  const size = Math.random() * 0.3 + 0.8;

  el.style.left = left + '%';
  el.style.animationDuration = duration + 's';
  el.style.setProperty('--drift', drift + 'px');
  el.style.transform = `scale(${size})`;

  const bid = 'bubble-' + (bubbleId++);
  el.id = bid;

  el.addEventListener('mouseenter', () => {
    el.classList.add('paused');
    activeBubble = el;
    showPhotoPopup(el, pair.photo);
  });

  el.addEventListener('mouseleave', () => {
    el.classList.remove('paused');
    activeBubble = null;
    hidePhotoPopup();
  });

  el.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (activeBubble === el) {
      el.classList.remove('paused');
      activeBubble = null;
      hidePhotoPopup();
    } else {
      if (activeBubble) {
        activeBubble.classList.remove('paused');
      }
      el.classList.add('paused');
      activeBubble = el;
      showPhotoPopup(el, pair.photo);
    }
  });

  bubbleContainer.appendChild(el);

  el.addEventListener('animationend', () => {
    if (activeBubble === el) {
      activeBubble = null;
      hidePhotoPopup();
    }
    const target = document.getElementById(bid);
    if (target) target.remove();
  });
}

function scheduleBubble() {
  createBubble();
  const delay = Math.random() * 600 + 300;
  setTimeout(scheduleBubble, delay);
}
scheduleBubble();

for (let i = 0; i < 5; i++) {
  setTimeout(() => createBubble(), i * 200);
}

// ========== 点击爱心 ==========
document.addEventListener('click', (e) => {
  const heart = document.createElement('div');
  heart.className = 'click-heart';
  heart.textContent = ['💗', '💖', '💕', '💝', '❤️'][Math.floor(Math.random() * 5)];
  heart.style.left = e.clientX + 'px';
  heart.style.top = e.clientY + 'px';
  document.body.appendChild(heart);

  heart.addEventListener('animationend', () => heart.remove());
});

// ========== 卡片可编辑 ==========
const cardTitle = document.querySelector('.card h1');
const cardSub = document.querySelector('.card p.sub');

cardTitle.addEventListener('dblclick', () => {
  const input = document.createElement('input');
  input.value = cardTitle.textContent;
  input.style.cssText = `
    font-size: 42px; text-align: center; background: transparent;
    border: none; border-bottom: 2px solid rgba(255,255,255,0.5);
    color: #fff; outline: none; width: 100%;
    letter-spacing: 4px; font-family: inherit;
    text-shadow: 0 0 30px rgba(255,150,200,0.6);
  `;
  cardTitle.replaceWith(input);
  input.focus();
  input.select();

  const commit = () => {
    cardTitle.textContent = input.value || '我喜欢你';
    input.replaceWith(cardTitle);
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') commit();
  });
});

cardSub.addEventListener('dblclick', () => {
  const textarea = document.createElement('textarea');
  textarea.value = cardSub.innerHTML.replace(/<br>/g, '\n');
  textarea.style.cssText = `
    font-size: 18px; text-align: center; background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3); border-radius: 12px;
    color: #fff; outline: none; width: 100%; min-height: 60px;
    letter-spacing: 2px; font-family: inherit; padding: 8px;
    resize: none; line-height: 1.6;
  `;
  cardSub.replaceWith(textarea);
  textarea.focus();
  textarea.select();

  const commit = () => {
    cardSub.innerHTML = (textarea.value || '从遇见你的那天起<br>我的世界就开满了花').replace(/\n/g, '<br>');
    textarea.replaceWith(cardSub);
  };
  textarea.addEventListener('blur', commit);
  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      commit();
    }
  });
});
</script>
</body>
</html>

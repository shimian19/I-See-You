<style>

  body {
    width: 100vw;

    overflow: hidden;

    -webkit-user-select: none;

    50% { background-position: 100% 100%; }
    75% { background-position: 0% 100%; }

    width: 100%; height: 100%;

    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 2;
  }

  .bubble {
    position: absolute;
    bottom: -120px;
    padding: 12px 22px;
    border-radius: 50px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(6px);

    animation: rise linear forwards;
  }

    transition: opacity 0.3s ease;
  }

    animation-play-state: paused;

  }

    pointer-events: none;
    z-index: 20;
    opacity: 0;
    transform: translate(-50%, 10px) scale(0.6);
    transition: opacity 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .photo-popup.show {
    opacity: 1;
    transform: translate(-50%, -100%) scale(1);
  }

    width: 180px;
    height: 180px;

  }

    display: none;
  }

  @keyframes rise {
    0% {
      transform: translateY(0) translateX(0);
      opacity: 0;
    }
    5% {
      opacity: 1;
    }
    85% {
      opacity: 1;
    }
    100% {

      opacity: 0;
    }

    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    padding: 50px 60px;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.08);

// ========== Canvas 爱心粒子 ==========
const canvas = document.getElementById('heartsCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
let animationId;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class Particle {
  constructor() {
    this.reset();
  }

  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 14 + 4;
    this.speedY = -Math.random() * 0.4 - 0.15;
    this.speedX = (Math.random() - 0.5) * 0.3;
    this.opacity = Math.random() * 0.35 + 0.08;
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = Math.random() * 0.008 + 0.003;
  }

  update() {
    this.y += this.speedY;
    this.x += this.speedX + Math.sin(this.wobble) * 0.3;
    this.wobble += this.wobbleSpeed;

    if (this.y < -30 || this.x < -30 || this.x > canvas.width + 30) {
      this.reset();
      this.y = canvas.height + 30;
    }
  }

  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.opacity;
    ctx.fillStyle = '#ffb3c6';
    ctx.font = `${this.size}px serif`;
    ctx.fillText('♥', this.x, this.y);
    ctx.restore();
  }
}

for (let i = 0; i < 50; i++) {
  const p = new Particle();
  p.y = Math.random() * canvas.height;
  particles.push(p);
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.update();
    p.draw(ctx);
  });
  animationId = requestAnimationFrame(animateParticles);
}
animateParticles();

// ========== 气泡系统 ==========
const bubbleContainer = document.getElementById('bubbleContainer');
let bubbleId = 0;

// 全局照片弹窗

photoPopup.className = 'photo-popup';
photoPopup.innerHTML = '<img src="" alt="我们的照片">';
document.body.appendChild(photoPopup);
const photoPopupImg = photoPopup.querySelector('img');

let activeBubble = null;
const activeMsgs = new Set();  // 去重：记录屏幕上正在显示的句子

function showPhotoPopup(bubbleEl, photoSrc) {
  if (!photoSrc) return;
  photoPopupImg.src = photoSrc;
  photoPopupImg.onerror = () => {
    photoPopupImg.src = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#ff6b9d"/><stop offset="100%" style="stop-color:#c44dff"/></linearGradient></defs><rect width="180" height="180" rx="18" fill="url(#g)"/><text x="90" y="80" text-anchor="middle" font-size="44">📷</text><text x="90" y="118" text-anchor="middle" font-size="14" fill="white" font-family="sans-serif">放入照片</text><text x="90" y="140" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.7)" font-family="sans-serif">photos/ 文件夹</text></svg>');
  };
  const rect = bubbleEl.getBoundingClientRect();
  photoPopup.style.left = (rect.left + rect.width / 2) + 'px';
  photoPopup.style.top = (rect.top - 8) + 'px';
  photoPopup.classList.add('show');
}

function hidePhotoPopup() {
  photoPopup.classList.remove('show');

function createBubble() {
  // 筛选出当前屏幕不存在的句子，避免同一句重复出现
  const available = bubblePairs.filter(p => !activeMsgs.has(p.msg));

  const el = document.createElement('div');
  el.className = 'bubble';

  const pair = available[Math.floor(Math.random() * available.length)];
  activeMsgs.add(pair.msg);

  el.innerHTML = `<span class="bubble-text">${pair.msg}</span>`;

  const left = Math.random() * 85 + 5;
  const duration = Math.random() * 8 + 14;
  const drift = (Math.random() - 0.5) * 80;
  const size = Math.random() * 0.3 + 0.8;

  el.style.left = left + '%';
  el.style.animationDuration = duration + 's';
  el.style.setProperty('--drift', drift + 'px');
  el.style.transform = `scale(${size})`;

  const bid = 'bubble-' + (bubbleId++);
  el.id = bid;

  el.addEventListener('mouseenter', () => {
    el.classList.add('paused');
    activeBubble = el;
    showPhotoPopup(el, pair.photo);
  });

  el.addEventListener('mouseleave', () => {
    el.classList.remove('paused');
    activeBubble = null;
    hidePhotoPopup();
  });

  el.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (activeBubble === el) {
      el.classList.remove('paused');
      activeBubble = null;
      hidePhotoPopup();
    } else {
      if (activeBubble) {
        activeBubble.classList.remove('paused');
      }
      el.classList.add('paused');
      activeBubble = el;
      showPhotoPopup(el, pair.photo);
    }
  });

  bubbleContainer.appendChild(el);

  el.addEventListener('animationend', () => {
    if (activeBubble === el) {
      activeBubble = null;
      hidePhotoPopup();
    }
    activeMsgs.delete(pair.msg);
    const target = document.getElementById(bid);
    if (target) target.remove();
  });
}

function scheduleBubble() {
  createBubble();
  const delay = Math.random() * 600 + 300;
  setTimeout(scheduleBubble, delay);
}
scheduleBubble();

for (let i = 0; i < 5; i++) {
  setTimeout(() => createBubble(), i * 200);
}

document.addEventListener('click', (e) => {
  const heart = document.createElement('div');
  heart.className = 'click-heart';
  heart.textContent = ['💗', '💖', '💕', '💝', '❤️'][Math.floor(Math.random() * 5)];
  heart.style.left = e.clientX + 'px';
  heart.style.top = e.clientY + 'px';
  document.body.appendChild(heart);

  heart.addEventListener('animationend', () => heart.remove());
});

// ========== 卡片可编辑 ==========
const cardTitle = document.querySelector('.card h1');
const cardSub = document.querySelector('.card p.sub');

cardTitle.addEventListener('dblclick', () => {
  const input = document.createElement('input');
  input.value = cardTitle.textContent;
  input.style.cssText = `
    font-size: 42px; text-align: center; background: transparent;
    border: none; border-bottom: 2px solid rgba(255,255,255,0.5);
    color: #fff; outline: none; width: 100%;
    letter-spacing: 4px; font-family: inherit;
    text-shadow: 0 0 30px rgba(255,150,200,0.6);
  `;
  cardTitle.replaceWith(input);
  input.focus();
  input.select();

  const commit = () => {
    cardTitle.textContent = input.value || '我喜欢你';
    input.replaceWith(cardTitle);
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') commit();
  });
});

cardSub.addEventListener('dblclick', () => {
  const textarea = document.createElement('textarea');
  textarea.value = cardSub.innerHTML.replace(/<br>/g, '\n');
  textarea.style.cssText = `
    font-size: 18px; text-align: center; background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3); border-radius: 12px;
    color: #fff; outline: none; width: 100%; min-height: 60px;
    letter-spacing: 2px; font-family: inherit; padding: 8px;
    resize: none; line-height: 1.6;
  `;
  cardSub.replaceWith(textarea);
  textarea.focus();
  textarea.select();

  const commit = () => {
    cardSub.innerHTML = (textarea.value || '从遇见你的那天起<br>我的世界就开满了花').replace(/\n/g, '<br>');
    textarea.replaceWith(cardSub);
  };
  textarea.addEventListener('blur', commit);
  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      commit();
    }
  });
});
